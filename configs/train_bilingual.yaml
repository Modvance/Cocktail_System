seed: 42
device: cuda

data:
  sample_rate: 16000
  mixture_duration: 8.0
  enrollment_duration: 5.0
  train_csv: data/generated/Bilingual-TSE-Mix/train.csv
  valid_csv: data/generated/Bilingual-TSE-Mix/valid.csv

feature:
  n_fft: 512
  win_length: 512
  hop_length: 256
  n_mels: 80
  f_min: 80
  f_max: 7600
  enrollment_feature_type: log_mel
  eps: 1.0e-8

model:
  speaker_embed_dim: 128
  speaker_hidden_dim: 256
  speaker_num_layers: 3
  hidden_dim: 256
  lstm_hidden_dim: 256
  lstm_layers: 2
  mask_hidden_dim: 256
  mask_layers: 1
  dropout: 0.1
  use_enrollment: true
  use_film: true
  use_attention: true

train:
  batch_size: 64
  epochs: 60
  lr: 0.0005
  weight_decay: 0.000001
  grad_clip: 5.0
  amp: false
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  shuffle_train: true
  drop_last_train: true
  gain_augment_db: 3.0
  validate_every: 2
  train_metrics_every: 2
  save_examples_every: 0
  save_examples_on_best: true

loss:
  sisdr_weight: 1.0
  mag_weight: 0.2
  mrstft_weight: 0.0
  spk_weight: 0.0

checkpoint:
  save_dir: checkpoints/bilingual_tse_fam
  monitor: valid_sisdr_i
  mode: max
