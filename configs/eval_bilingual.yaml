runs:
  - name: bilingual_model_on_bilingual
    config: configs/train_bilingual.yaml
    ckpt: checkpoints/bilingual_tse_fam/best.pt
    test_csv: data/generated/Bilingual-TSE-Mix/test.csv
    out_dir: results/eval/bilingual_model_on_bilingual
  - name: bilingual_model_on_en
    config: configs/train_bilingual.yaml
    ckpt: checkpoints/bilingual_tse_fam/best.pt
    test_csv: data/generated/EN-TSE-Mix/test.csv
    out_dir: results/eval/bilingual_model_on_en
  - name: bilingual_model_on_zh
    config: configs/train_bilingual.yaml
    ckpt: checkpoints/bilingual_tse_fam/best.pt
    test_csv: data/generated/ZH-TSE-Mix/test.csv
    out_dir: results/eval/bilingual_model_on_zh
num_examples: 3
